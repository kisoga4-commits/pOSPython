<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAKDU Staff Panel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ asset_version }}" />
</head>
<body>
  <main class="mobile-shell">
    <header class="mobile-header">
      <div class="brand-zone">
        <div class="logo-slot">LOGO</div>
        <div>
          <small class="on-dark">FAKDU Staff</small>
          <h1 class="mobile-title">พนักงาน</h1>
        </div>
      </div>
      <p class="mobile-subtitle">โหมดสแกนสำหรับพนักงาน: ลูกค้า และ เช็คบิล</p>
    </header>

    <section class="mobile-content staff-mobile">
      <div class="mobile-panel">
        <div class="segmented">
          <button class="seg-btn is-active" data-staff-tab="customer" type="button">ลูกค้า</button>
          <button class="seg-btn" data-staff-tab="checkout" type="button">เช็คบิล</button>
        </div>
      </div>

      <section id="staff-tab-customer" class="mobile-panel">
        <div class="section-head">
          <h3>โต๊ะที่ต้องดูแล</h3>
          <span class="status-badge">ลูกค้า</span>
        </div>
        <div id="staff-customer-list" class="order-list"></div>
      </section>

      <section id="staff-tab-checkout" class="mobile-panel hidden">
        <div class="section-head">
          <h3>คิวเช็คบิล</h3>
          <span class="status-badge">เช็คบิล</span>
        </div>
        <div id="staff-checkout-list" class="order-list"></div>
      </section>
    </section>
  </main>
  <audio id="new-order-sound" src="{{ url_for('static', filename='sounds/new_order.mp3') }}"></audio>
  <script src="{{ url_for('static', filename='staff.js') }}?v={{ asset_version }}"></script>
</body>
</html>
