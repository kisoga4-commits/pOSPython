<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Ordering</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header><h1>📱 ลูกค้าสั่งเพิ่ม</h1></header>
  <main>
    <section class="screen">
      <label>โหมด
        <select id="target-type">
          <option value="table">โต๊ะ</option>
          <option value="queue">คิว</option>
        </select>
      </label>
      <input id="target-id" type="number" min="1" placeholder="หมายเลขโต๊ะ/คิว" />
      <div id="menu-list"></div>
      <div id="cart-list"></div>
      <button id="submit-order">สั่งเพิ่ม</button>
      <p id="message"></p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='customer.js') }}"></script>
</body>
</html>
