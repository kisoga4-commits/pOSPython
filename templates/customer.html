<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Ordering</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body data-table-id="{{ table_id or '' }}">
  <main class="mobile-shell">
    <section class="section-card customer-mobile">
      <h1>📱 สั่งอาหารเพิ่ม</h1>
      <p class="muted">สั่งได้เฉพาะโต๊ะของคุณ</p>
      <div id="table-badge" class="badge status-accepted_order"></div>
      <div id="menu-list" class="chip-grid mobile-menu"></div>
      <h3>รายการที่เลือก</h3>
      <div id="cart-list" class="order-list"></div>
      <div class="btn-row">
        <button id="submit-order" class="btn-primary">สั่งเพิ่ม</button>
        <button id="request-checkout" class="btn-secondary">เรียกเช็คบิล</button>
      </div>
      <p id="message"></p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='customer.js') }}"></script>
</body>
</html>
