<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Bill Display</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ asset_version }}" />
</head>
<body class="customer-facing-body" data-table-id="{{ table_id }}">
  <main class="customer-facing-wrap">
    <header class="customer-facing-header">
      <h1>เช็คบิล โต๊ะ <span id="customer-facing-table">{{ table_id or '-' }}</span></h1>
      <small id="customer-facing-mode-note">หน้าจอลูกค้า (Customer View)</small>
    </header>

    <section id="customer-facing-items" class="customer-facing-items"></section>

    <section class="customer-facing-foot">
      <div class="customer-facing-total">
        รวมทั้งสิ้น <strong><span id="customer-facing-total">0</span> บาท</strong>
      </div>
      <div id="customer-facing-qr-wrap" class="customer-facing-qr hidden">
        <img id="customer-facing-qr-image" class="qr-preview" alt="Payment QR" />
      </div>
      <small id="customer-facing-qr-note" class="muted hidden"></small>
    </section>
  </main>

  <script src="{{ url_for('static', filename='promptpay.js') }}?v={{ asset_version }}"></script>
  <script src="{{ url_for('static', filename='customer_display.js') }}?v={{ asset_version }}"></script>
</body>
</html>
