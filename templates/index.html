<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS แม่ข่าย</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div id="license-screen" class="overlay">
    <div class="card">
      <h2>🔒 Activate License</h2>
      <p>Machine ID: <span id="machine-id"></span></p>
      <input id="license-key" placeholder="License Key" maxlength="16" />
      <button id="activate-btn">Activate</button>
      <p id="license-message"></p>
    </div>
  </div>

  <header>
    <h1>🍲 POS เครื่องแม่</h1>
    <small>LAN IP: {{ local_ip }}:5000</small>
  </header>

  <main>
    <section class="screen">
      <h2>ศูนย์ควบคุม</h2>
      <div class="action-grid">
        <button data-screen="pos">POS</button>
        <button data-screen="cashier">แคชเชียร์</button>
        <button data-screen="kitchen">หลังร้าน/ครัว</button>
        <button data-screen="settings">ตั้งค่า</button>
        <button data-screen="report">รายงาน</button>
      </div>
      <div class="links">
        <p>Customer: <a id="customer-link" target="_blank"></a></p>
        <p>Staff: <a id="staff-link" target="_blank"></a></p>
      </div>
    </section>

    <section id="pos" class="screen hidden">
      <h2>POS</h2>
      <div id="table-grid"></div>
      <div id="menu-area" class="hidden">
        <h3>โต๊ะ <span id="active-table"></span></h3>
        <div id="menu-list"></div>
        <div id="cart-list"></div>
        <button id="submit-order">ส่งออเดอร์</button>
      </div>
    </section>

    <section id="cashier" class="screen hidden">
      <h2>แคชเชียร์</h2>
      <div id="checkout-list"></div>
    </section>

    <section id="kitchen" class="screen hidden">
      <h2>ออเดอร์ทั้งหมด</h2>
      <div id="all-orders"></div>
    </section>

    <section id="settings" class="screen hidden">
      <h2>ตั้งค่า</h2>
      <label>จำนวนโต๊ะ <input id="table-count" type="number" min="1" /></label>
      <button id="save-settings">บันทึก</button>
      <button id="reset-day">รีเซ็ตวัน</button>
    </section>

    <section id="report" class="screen hidden">
      <h2>รายงาน</h2>
      <p>ยอดขายรวม: <strong id="sales-total">0</strong> บาท</p>
      <div id="sales-list"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
