<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authorize Staff Device</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ asset_version }}" />
</head>
<body class="customer-app">
  <main class="mobile-shell app-mobile delivery-app-shell">
    <section class="mobile-panel compact-panel">
      <h3>สแกนพนักงาน (มือถือ)</h3>
      <p>เลือกโหมดการทำงานสำหรับเครื่องพนักงาน</p>
      <div class="btn-row two-col">
        <button id="go-customer-mode" class="btn-primary" type="button">👥 โหมดลูกค้า</button>
        <button id="go-checkout-mode" class="btn-secondary" type="button">💵 โหมดเช็คบิล</button>
      </div>
      <p class="muted">โหมดนี้จะทำงานเหมือนเครื่องแม่ และจำกัดไว้เฉพาะโหมดลูกค้า/เช็คบิล</p>
      <p id="authorize-note" class="muted"></p>
    </section>
  </main>
  <script>
    const staffBase = '{{ staff_base_url }}';
    function goStaff(mode) {
      localStorage.setItem('user_role', 'staff');
      document.getElementById('authorize-note').textContent = 'กำลังพาไปยังโหมดพนักงาน...';
      setTimeout(() => {
        window.location.href = `${staffBase}/?mode=scanner&screen=${mode === 'checkout' ? 'cashier' : 'customer'}`;
      }, 350);
    }
    document.getElementById('go-customer-mode').addEventListener('click', () => goStaff('customer'));
    document.getElementById('go-checkout-mode').addEventListener('click', () => goStaff('checkout'));
  </script>
</body>
</html>
